name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install liblouis
        run: sudo apt-get install -y liblouis-dev

      - name: Install sbs-braille-tables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo sbsdev/sbs-braille-tables --pattern '*.deb' --dir /tmp
          sudo apt-get install -y /tmp/sbs-braille-tables_*.deb

      - name: Create generated table stubs
        run: |
          sudo touch /usr/local/share/liblouis/tables/sbs-de-g1-white.mod
          sudo touch /usr/local/share/liblouis/tables/sbs-de-g2-name-white.mod
          sudo touch /usr/local/share/liblouis/tables/sbs-de-g2-place-white.mod
          sudo touch /usr/local/share/liblouis/tables/sbs-de-g2-white.mod

      - name: Verify table installation
        run: |
          echo "=== liblouis version ==="
          dpkg -l liblouis-dev | tail -1
          echo "=== sbs tables dir ==="
          ls /usr/local/share/liblouis/tables/ | head -10
          echo "=== sbs.dis present? ==="
          ls -la /usr/local/share/liblouis/tables/sbs.dis || echo "MISSING"
          echo "=== system tables dir ==="
          ls /usr/share/liblouis/tables/ | head -10

      - name: Build
        env:
          LOUIS_TABLEPATH: /usr/local/share/liblouis/tables:/usr/share/liblouis/tables
        run: mvn --batch-mode package

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            target/dtbook2sbsform_*.deb
